<style>

  .mobile-event-chip {

<script>
const storageKey = window.INCHEON_ASTRO_EXPERIENCE_KEY;
const dataUrl = window.INCHEON_ASTRO_EXPERIENCE_DATA_URL || "experience.data";
const statusLabels = window.INCHEON_ASTRO_EXPERIENCE_STATUS || { open: "접수중", wait: "대기", closed: "마감" };
const programNames = window.INCHEON_ASTRO_EXPERIENCE_PROGRAMS || [];
const programShortLabels = {
  "가족과 함께하는 우주여행": "가족 우주여행",
  "일일별자리체험": "별자리체험"
};
const mobileProgramLabels = {
  "가족과 함께하는 우주여행": "가족",
  "일일별자리체험": "별자리"
};
const calendarGrid = document.getElementById("calendar-grid");
const mobileCalendar = document.getElementById("mobile-calendar");
const monthTitle = document.getElementById("month-title");
const monthKicker = document.getElementById("month-kicker");
const selectedTitle = document.getElementById("selected-title");
const selectedEvents = document.getElementById("selected-events");
const upcomingEvents = document.getElementById("upcoming-events");
const prevMonth = document.getElementById("prev-month");
const nextMonth = document.getElementById("next-month");
const todayButton = document.getElementById("today-button");

let schedule = cloneData(window.INCHEON_ASTRO_DEFAULT_EXPERIENCE || { events: [] });
let viewDate = new Date();
let selectedDateKey = formatDateKey(new Date());

function cloneData(data) {
  return JSON.parse(JSON.stringify(data));
}

function normalizeSchedule(data) {
  const events = Array.isArray(data?.events) ? data.events : [];
  return {
    events: events
      .filter((event) => {
        const isKnownProgram = programNames.length === 0 || programNames.includes(event.title);
        return event
          && typeof event.id === "string"
          && /^\d{4}-\d{2}-\d{2}$/.test(event.date || "")
          && /^\d{2}:\d{2}$/.test(event.time || "")
          && isKnownProgram
          && Object.prototype.hasOwnProperty.call(statusLabels, event.status);
      })
      .map((event) => ({
        id: event.id,
        date: event.date,
        time: event.time,
        title: event.title,
        status: event.status,
        memo: typeof event.memo === "string" ? event.memo : ""
      }))
      .sort((a, b) => `${a.date}${a.time}`.localeCompare(`${b.date}${b.time}`))
  };
}

async function loadSchedule() {
  let loadedSchedule = cloneData(window.INCHEON_ASTRO_DEFAULT_EXPERIENCE || { events: [] });

  try {
    const response = await fetch(`${dataUrl}?v=${Date.now()}`, { cache: "no-store" });
    if (response.ok) {
      loadedSchedule = normalizeSchedule(await response.json());
    }
  } catch (error) {
  }

  try {
    const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
    if (saved) {
      loadedSchedule = normalizeSchedule(saved);
    }
  } catch (error) {
  }

  return loadedSchedule;
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function formatDateKey(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function parseDateKey(dateKey) {
  const [year, month, day] = dateKey.split("-").map(Number);
  return new Date(year, month - 1, day);
}

function formatKoreanDate(dateKey) {
  const date = parseDateKey(dateKey);
  return new Intl.DateTimeFormat("ko-KR", {
    month: "long",
    day: "numeric",
    weekday: "short"
  }).format(date);
}

function getEventsForDate(dateKey) {
  return schedule.events.filter((event) => event.date === dateKey);
}

function getStatusClass(status) {
  return {
    open: "status-open",
    wait: "status-wait",
    closed: "status-closed"
  }[status] || "status-wait";
}

function getProgramShortLabel(title) {
  return programShortLabels[title] || title;
}

function getMobileProgramLabel(title) {
  return mobileProgramLabels[title] || getProgramShortLabel(title);
}

function renderEventCard(event) {
  return `
    <article class="min-w-0 rounded-xl border border-gray-200 bg-gray-50 p-4">
      <div class="flex min-w-0 items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="whitespace-nowrap text-xs font-bold text-gray-500 sm:text-sm">${event.date} ${event.time}</p>
          <h4 class="mt-1 break-keep font-headline text-base font-bold leading-snug text-black sm:text-lg">${event.title}</h4>
        </div>
        <span class="status-pill ${getStatusClass(event.status)} shrink-0 px-2.5 py-1 text-[11px] sm:px-3 sm:text-xs">${statusLabels[event.status]}</span>
      </div>
      ${event.memo ? `<p class="mt-3 break-keep text-sm leading-6 text-gray-600">${event.memo}</p>` : ""}
    </article>
  `;
}

function renderCalendar() {
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const todayKey = formatDateKey(new Date());
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const blankCount = firstDay.getDay();
  const monthEvents = schedule.events.filter((event) => {
    const date = parseDateKey(event.date);
    return date.getFullYear() === year && date.getMonth() === month;
  });

  monthTitle.textContent = `${year}년 ${month + 1}월`;
  monthKicker.textContent = `${monthEvents.length}개 일정`;

  const cells = [];
  for (let index = 0; index < blankCount; index += 1) {
    cells.push(`<div class="calendar-cell rounded-xl border border-dashed border-gray-200 bg-white/50"></div>`);
  }

  for (let day = 1; day <= daysInMonth; day += 1) {
    const date = new Date(year, month, day);
    const dateKey = formatDateKey(date);
    const events = getEventsForDate(dateKey);
    const isToday = dateKey === todayKey;
    const isSelected = dateKey === selectedDateKey;
    const visibleEvents = events.slice(0, 2);
    const hiddenCount = events.length - visibleEvents.length;

    cells.push(`
      <button class="calendar-cell ${isToday ? "is-today" : ""} ${isSelected ? "is-selected" : ""} flex flex-col rounded-xl border border-gray-200 bg-white p-2 text-left" type="button" data-date="${dateKey}">
        <span class="date-number inline-flex h-7 w-7 items-center justify-center rounded-full text-sm font-bold text-gray-900">${day}</span>
        <span class="mt-2 flex flex-1 flex-col gap-1.5 overflow-hidden">
          ${visibleEvents.map((event) => `
            <span class="event-chip ${getStatusClass(event.status)} px-2 py-1.5">
              <span class="event-time">${event.time}</span>
              <span class="event-program"><span class="program-dot"></span><span class="event-program-label">${getProgramShortLabel(event.title)}</span></span>
            </span>
          `).join("")}
          ${hiddenCount > 0 ? `<span class="text-xs font-bold text-gray-500">+${hiddenCount}개 더</span>` : ""}
        </span>
      </button>
    `);
  }

  calendarGrid.innerHTML = cells.join("");
  renderMobileCalendar(year, month, todayKey);
  renderSelectedEvents();
  renderUpcomingEvents();
}

function renderMobileCalendar(year, month, todayKey) {
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDate = new Date(year, month, 1 - firstDay.getDay());
  const totalCells = Math.ceil((firstDay.getDay() + daysInMonth) / 7) * 7;
  const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
  const weeks = [];

  for (let index = 0; index < totalCells; index += 7) {
    const days = [];
    for (let offset = 0; offset < 7; offset += 1) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + index + offset);
      const dateKey = formatDateKey(date);
      const events = getEventsForDate(dateKey);
      const visibleEvents = events.slice(0, 2);
      const hiddenCount = events.length - visibleEvents.length;
      const isCurrentMonth = date.getMonth() === month;
      const isToday = dateKey === todayKey;
      const isSelected = dateKey === selectedDateKey;

      days.push(`
        <button class="mobile-day ${isCurrentMonth ? "" : "is-other"} ${isToday ? "is-today" : ""} ${isSelected ? "is-selected" : ""}" type="button" data-date="${dateKey}">
          <span class="mobile-date-number">${date.getDate()}</span>
          <span class="mobile-event-stack">
            ${visibleEvents.map((event) => `
              <span class="mobile-event-chip ${getStatusClass(event.status)}">
                <span class="mobile-event-time">${event.time.slice(0, 2)}시</span>
                <span class="mobile-event-name">${getMobileProgramLabel(event.title)}</span>
              </span>
            `).join("")}
            ${hiddenCount > 0 ? `<span class="mobile-more">+${hiddenCount}</span>` : ""}
          </span>
        </button>
      `);
    }
    weeks.push(`<div class="mobile-week mt-1">${days.join("")}</div>`);
  }

  mobileCalendar.innerHTML = `
    <div class="mobile-calendar-board">
      <div class="mobile-weekdays">
        ${dayNames.map((day, index) => `<div class="${index === 0 ? "text-red-400" : index === 6 ? "text-blue-400" : ""}">${day}</div>`).join("")}
      </div>
      ${weeks.join("")}
    </div>
  `;
}

function renderSelectedEvents() {
  const events = getEventsForDate(selectedDateKey);
  selectedTitle.textContent = formatKoreanDate(selectedDateKey);
  selectedEvents.innerHTML = events.length
    ? events.map(renderEventCard).join("")
    : `<div class="break-keep rounded-xl border border-dashed border-gray-200 bg-gray-50 p-4 text-sm font-bold leading-6 text-gray-500 sm:p-5">등록된 일일체험 일정이 없습니다.</div>`;
}

function renderUpcomingEvents() {
  const todayKey = formatDateKey(new Date());
  const events = schedule.events.filter((event) => event.date >= todayKey).slice(0, 5);
  upcomingEvents.innerHTML = events.length
    ? events.map(renderEventCard).join("")
    : `<div class="break-keep rounded-xl border border-dashed border-gray-200 bg-gray-50 p-4 text-sm font-bold leading-6 text-gray-500 sm:p-5">다가오는 일정이 없습니다.</div>`;
}

function selectCalendarDate(event) {
  const button = event.target.closest("[data-date]");
  if (!button) return;
  selectedDateKey = button.dataset.date;
  renderCalendar();
}

calendarGrid.addEventListener("click", selectCalendarDate);
mobileCalendar.addEventListener("click", selectCalendarDate);

prevMonth.addEventListener("click", () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
  renderCalendar();
});

nextMonth.addEventListener("click", () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);
  renderCalendar();
});

todayButton.addEventListener("click", () => {
  viewDate = new Date();
  selectedDateKey = formatDateKey(viewDate);
  renderCalendar();
});

function setupReveal() {
  document.body.classList.add("motion-ready");
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("is-visible");
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.14 });

  document.querySelectorAll("[data-reveal]").forEach((node) => observer.observe(node));
}

async function init() {
  setupReveal();
  schedule = await loadSchedule();
  renderCalendar();
}

init();
</script>
</body>
</html>
